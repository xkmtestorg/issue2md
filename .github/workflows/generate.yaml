name: generate
on:
  workflow_dispatch: 
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read

jobs:
  generate:
    if: contains(github.event.issue.labels.*.name, 'document')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: mkdir -p generated && ./bash.sh > "generated/[${{github.event.issue.number}}]-${{ github.event.issue.title}}.md"
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_ID: ${{ github.event.issue.number }}
      - run: |
          git config user.name "github-actions[issue2md]"
          git config user.email "github-actions[issue2md]@users.noreply.github.com"

          git add ./generated

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Add generated file for issue #${{github.event.issue.number}}"
          git push
          

    
